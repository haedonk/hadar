apiVersion: v1
kind: ConfigMap
metadata:
  name: scoring-pipeline-config
  namespace: hadar
data:
  DB_DRIVER: postgresql+asyncpg
  DB_HOST: postgres.db.svc.cluster.local
  DB_NAME: zigbee_db
  DB_PORT: "5432"
  DEBUG: "false"
  HADAR_DATA_DIR: /mnt/hadar-data
  FEATURE_CONTEXT_HOURS: "6"
  HOURLY_SCORING_LOOKBACK_HOURS: "1"
