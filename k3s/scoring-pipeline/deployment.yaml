apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoring-pipeline
  namespace: hadar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scoring-pipeline
  template:
    metadata:
      labels:
        app: scoring-pipeline
    spec:
      containers:
        - name: scoring-pipeline
          image: haka9670/scoring-pipeline:65708ed
          imagePullPolicy: IfNotPresent
          command:
            - python
            - main.py
          envFrom:
            - secretRef:
                name: isolation-forest-creds
            - configMapRef:
                name: scoring-pipeline-config
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "test -d /proc/1 && test -w /mnt/hadar-data/output/hourly-scoring-runs && test -r /mnt/hadar-model-data/output/promoted_model.json"
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "test -d /proc/1 && test -d /mnt/hadar-data/output/hourly-scoring-runs"
            initialDelaySeconds: 60
            periodSeconds: 60
            failureThreshold: 3
            timeoutSeconds: 5
          volumeMounts:
            - name: hadar-data
              mountPath: /mnt/hadar-data
              subPath: scoring-pipeline
            - name: hadar-data
              mountPath: /mnt/hadar-model-data
              subPath: isolation-forest
              readOnly: true
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: hadar-data
          persistentVolumeClaim:
            claimName: hadar-data-pvc
