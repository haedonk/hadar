apiVersion: apps/v1
kind: Deployment
metadata:
  name: hadar-ui
  namespace: hadar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hadar-ui
  template:
    metadata:
      labels:
        app: hadar-ui
    spec:
      containers:
        - name: hadar-ui
          image: haka9670/hadar-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 200m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
